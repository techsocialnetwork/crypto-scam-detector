<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
</head>
<body>
    <h1>Test Button</h1>
    <button onclick="testClick()">Click Me</button>
    <div id="result"></div>
    
    <script>
        function testClick() {
            document.getElementById('result').innerHTML = 'Button works! Ethers loaded: ' + (typeof ethers !== 'undefined');
        }
    </script>
</body>
</html>
